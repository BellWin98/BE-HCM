spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/hcm?useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        format_sql: true # 콘솔창에 출력되는 SQL문을 사람이 보기 편한 형태로 출력
        highlight_sql: true
    hibernate:
      # 스키마 변경은 Flyway(db/migration)가 담당한다. Hibernate 는 검증만 한다.
      ddl-auto: validate
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379


            client-secret: ENC(f462zIocxqSfY45b0Rl7Xo5o64T0KAIAexX6z62XdgE4etpyoIkcsbEuiaEsimfS)
            scope: openid, profile, email
          kakao:
            provider: kakao
            client-id: ENC(VcM1gMky6ozzmCSpUcIepk9llykUfkmOuqc9y0+efe2sthkM/Ug1X7v6tyxtjzqp)
            client-secret: ENC(q68jlsACTlm9tgGTX5C6Q8s+NSJGJL66PxEKlyO53aBAxV99goo2YUNUsp7BdCYV)

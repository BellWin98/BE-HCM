server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
    context-path: /
  error:
    whitelabel:
      enabled: false

spring:
  profiles:
    active: local
    include: secret
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB
  # 자동 구성된 RestClient.Builder 에 적용되는 타임아웃(global/config/RestClientConfig.java).
  # local 프로필은 SSL 무시를 위해 요청 팩토리를 직접 지정하므로 이 값이 적용되지 않고,
  # 같은 값을 httpclient5 ConnectionConfig 로 따로 설정한다.
  # (Boot 4.0 에서 spring.http.client.* 는 spring.http.clients.* 로 대체되었다.)
  http:
    clients:
      connect-timeout: 5s
      read-timeout: 5s
  jpa:
    # hibernate.dialect 는 명시하지 않는다(HHH90000025).
    # JDBC 메타데이터로 Hibernate 가 MySQLDialect 를 자동 선택한다.
    properties:
      hibernate:
        default_batch_fetch_size: 500
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 기존 dev/prod DB는 ddl-auto=update로 이미 스키마가 만들어져 있다.
    # baseline-on-migrate=true + baseline-version=1 이면 해당 DB들은 V1(baseline)을 건너뛰고
    # V2부터 적용된다. 신규/로컬 DB만 V1을 실제로 실행한다.
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "pre-flyway schema created by hibernate ddl-auto=update"
    validate-on-migrate: true
  mail:
    host: ENC(TirknCfj2ZkPj3nyJ9AjRn0fpKSiLCkK)
    port: 587
    username: ENC(eomNCOQJqgXyicrTgm/NW1cCsWBXxbMU/8Z0sD+NmME=)
    password: ENC(xceSdNFJ5/7DDvINycoaaGeKAaIdxf4xrrG2wFydiHA=)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

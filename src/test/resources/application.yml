server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
    context-path: /
  error:
    whitelabel:
      enabled: false

spring:
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB
  jpa:
    database: mysql
    generate-ddl: true
    properties:
      hibernate:
        default_batch_fetch_size: 500
    open-in-view: false
  mail:
    host: localhost
    port: 587
    username: test-mail-user
    password: test-mail-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: openid, profile, email
          kakao:
            provider: kakao
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            scope: profile_nickname, account_email
            client-name: Kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          naver:
            provider: naver
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            scope: name, email
            client-name: Naver
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# 테스트 환경에서는 실제 비밀값을 알 수 없으므로 secret 프로필(application-secret.yml, ENC(...) 값)을
# 포함하지 않고, 아래에 평문 테스트용 값을 직접 정의한다.
jwt:
  secret: test-only-jwt-secret-key-for-spring-context-tests-not-for-real-use
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

korea-investment:
  api:
    base-url: https://openapi.koreainvestment.com:9443
    app-key: test-app-key
    app-secret: test-app-secret
    account-number: test-account-number
    account-product-code: test-product-code

jasypt:
  encryptor:
    algorithm: PBEWithMD5AndDES
    pool-size: 2
    string-output-type: base64
    key-obtention-iterations: 1000
    # ENC(...) 값을 담은 secret 프로필을 로드하지 않으므로 실제 복호화에 쓰이지 않는다.
    # jasypt-spring-boot-starter가 빈 생성 시 요구하는 필수 프로퍼티를 만족시키기 위한 더미 값.
    password: test-only-placeholder-password

fcm:
  key-path: ${FCM_KEY_PATH:/app/config/fcm-key.json}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  override-with-generic-response: false
